name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chatjpt_test
          POSTGRES_USER: chatjpt_test
          POSTGRES_PASSWORD: chatjpt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatjpt_test -d chatjpt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://chatjpt_test:chatjpt_test@localhost:5432/chatjpt_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Apply test migrations
        run: DATABASE_URL="$TEST_DATABASE_URL" go run ./cmd/chatjpt-api migrate
      - name: Run tests
        run: go test ./...
      - name: Run go vet
        run: go vet ./...
      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose --env-file infra/.env.example config --quiet
      - name: Build API image
        run: docker build --tag chatjpt-api:ci .
      - name: Verify API image health-check utility
        run: docker run --rm --entrypoint wget chatjpt-api:ci --version
